# tmux config — matches starship powerline theme
# Requires a Nerd Font (e.g. FiraCode Nerd Font)

# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g focus-events on
set -g display-time 2000
set -g allow-rename off
set -g status 2

# ── Status Bar ────────────────────────────────────────────
# status 2 set above (enables two-row bar; "on" would reset to 1)
set -g status-position bottom
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=default fg=#cccccc"

set -g status-left "#[bg=#9060C8,fg=#f0f0f0,nobold] #(~/dotFiles/tmux-dir.sh '#{pane_current_path}') #(~/dotFiles/tmux-git.sh '#{pane_current_path}')"
set -g status-left-length 60

# Right: time | date (uptime moved to stats row)
set -g status-right "#[bg=default,fg=#9060C8]#[bg=#9060C8,fg=#f0f0f0]%l:%M %p #[nobold,fg=default,bg=#9060C8]#[bg=default,fg=#cccccc,bold] #(date '+%a %b %-d' | tr 'a-z' 'A-Z') "
set -g status-right-length 40

# ── Window Status ─────────────────────────────────────────────
# Colors come from @tab_open/@tab_close window options set by the hook script.
# Options are read synchronously — no caching delay on window switch.
set -g window-status-separator ""
set -g window-status-format "#[bg=#2e2e2e]#[fg=#888888]#[nobold] #I #{?#{automatic_rename},,#[#{@tab_arrow_on}]#[#{@tab_name_style}] #W #[#{@tab_arrow_off}]}"
set -g window-status-style "default"
set -g window-status-current-format "#[bg=#4a4a4a]#[fg=#f0f0f0]#[bold] #I #{?#{automatic_rename},,#[#{@tab_arrow_on}]#[#{@tab_name_style}] #W #[#{@tab_arrow_off}]}"
set -g window-status-current-style "default"

# ── Pane Borders ──────────────────────────────────────────────
set -g pane-border-style "fg=#4a4a4a"
set -g pane-active-border-style "fg=#A884D4"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#aaaaaa][#[fg=#c8a84b] #{?#{==:#{pane_title},#{host}},#I:#P,#{pane_title}} #[fg=#aaaaaa]] #[fg=#aaaaaa][#[fg=#A884D4] #{s|$HOME|~|:pane_current_path} #[fg=#aaaaaa]],#[fg=#666666][#[fg=#8a6f30] #{?#{==:#{pane_title},#{host}},#I:#P,#{pane_title}} #[fg=#666666]] #[fg=#666666][#[fg=#6344a0] #{s|$HOME|~|:pane_current_path} #[fg=#666666]]}"


# ── Message / Command Line ──────────────────────────────────────
set -g message-style "bg=#f5c211,fg=#2d1f00,bold"
set -g message-command-style "bg=#4a4a4a,fg=#ffffff"

# Recompute tab colors immediately on window switch/open/close.
# Hook script sets per-window @tab_open/@tab_close options — read synchronously,
# so colors update instantly with no caching delay.
set-hook -g after-select-window 'run-shell "~/dotFiles/tmux-tab-color-hook.sh"'
set-hook -g after-new-window 'run-shell "~/dotFiles/tmux-tab-color-hook.sh"'
set-hook -g after-kill-pane 'run-shell "~/dotFiles/tmux-tab-color-hook.sh"'
set-hook -g after-new-session 'run-shell "~/dotFiles/tmux-tab-color-hook.sh"'
set-hook -g client-session-changed 'run-shell "~/dotFiles/tmux-tab-color-hook.sh"'

# ── Keybindings ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g mode-keys vi
set -g status-keys vi
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Plugins (TPM) ────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'

set -g status-format[0] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange]#[align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
set -g status-format[1] "#[align=left range=left]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right]#[bg=default,fg=#5f87af]#[bg=#5f87af,fg=#f0f0f0] #(~/dotFiles/tmux-sysinfo.sh uptime) #[bg=#5f87af,fg=default]#[bg=default,fg=#cccccc,bold] UP #(~/dotFiles/tmux-cpu.sh)#[nobold,bg=default,fg=#b06078]#[bg=#b06078,fg=#f0f0f0] #(~/dotFiles/tmux-sysinfo.sh mem) #[bg=#b06078,fg=default]#[bg=default,fg=#cccccc,bold] MEM #(~/dotFiles/tmux-bat.sh)#[norange]"
run '~/.tmux/plugins/tpm/tpm'
