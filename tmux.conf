# tmux config — matches starship powerline theme
# Requires a Nerd Font (e.g. FiraCode Nerd Font)

# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g focus-events on
set -g display-time 2000
set -g allow-rename off
set -g allow-passthrough on
set-option -g default-command 'tput cup "$(tput lines)"; exec "$SHELL" -l'
set -g status on
set -g status-format[0] "#[list=on align=left]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"

# ── Status Bar ────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 1
set -g status-justify left
set -g status-style "bg=default fg=#cccccc"

set -g status-left ""
set -g status-left-length 60

# Right: cpu% / CPU \ memG / MEM \ bat% / BAT \ time / date
set -g status-right "#(~/dotFiles/tmux-scripts/tmux-powerline.sh status-right)"
set -g status-right-length 220

# ── Window Status ─────────────────────────────────────────────
# Colors come from @tab_open/@tab_close window options set by the hook script.
# Options are read synchronously — no caching delay on window switch.
set -g window-status-separator ""
set -g window-status-format "#[fg=#4a4a4a,bg=default]#{?#{@tab_has_left},,}#[#{@tab_name_style}] #I #[fg=#4a4a4a,bg=#4a4a4a]#[#{@tab_name_style}] #W #[fg=#4a4a4a,bg=default]"
set -g window-status-style "default"
set -g window-status-current-format "#[fg=#{@tab_dk_color},bg=default]#{?#{@tab_has_left},,}#[#{@tab_dk_style}] #I #[#{@tab_inner}]#[#{@tab_name_style}] #W #[fg=#{@tab_name_color},bg=default]"
set -g window-status-current-style "default"

# ── Pane Borders ──────────────────────────────────────────────
set -g pane-border-style "fg=#4a4a4a"
set -g pane-active-border-style "fg=#A884D4"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#{?#{@pane_border_fmt},#{E:@pane_border_fmt},#[bg=#4a4a4a,fg=#f0f0f0] #{s|$HOME|~|:pane_current_path} #[default]},#[fg=#6344a0] #{s|$HOME|~|:pane_current_path} #[default]}"


# ── Message / Command Line ──────────────────────────────────────
set -g message-style "bg=#f5c211,fg=#2d1f00,bold"
set -g message-command-style "bg=#4a4a4a,fg=#ffffff"

# Recompute tab colors immediately on window switch/open/close.
# Hook script sets per-window @tab_open/@tab_close options — read synchronously,
# so colors update instantly with no caching delay.
set-hook -g after-select-window 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g after-new-window 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g after-kill-pane 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g after-new-session 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g client-session-changed 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g after-select-pane 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh pane-colors"'
set-hook -g pane-focus-in 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh pane-colors"'

# ── Keybindings ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g mode-keys vi
set -g status-keys vi
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Claude ────────────────────────────────────────────────────────────────────
bind g popup -d '#{pane_current_path}' -w 85% -h 85% -E 'claude'
bind G new-window -c '#{pane_current_path}' 'claude'

# ── Plugins (TPM) ────────────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'sainnhe/tmux-fzf'

set -g @continuum-restore 'on'
set -g @sessionx-bind 'o'
set -g @floax-bind 'p'

run '~/.tmux/plugins/tpm/tpm'
