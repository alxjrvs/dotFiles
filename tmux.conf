# tmux config вЂ” matches starship powerline theme
# Requires a Nerd Font (e.g. FiraCode Nerd Font)

# в”Ђв”Ђ General в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000

# в”Ђв”Ђ Status Bar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g status on
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default fg=#ffffff"

set -g status-left ""
set -g status-left-length 0

# Right: lang env (via script, handles own transition) | date | time
# tmux-env.sh outputs lang segments + opening в—„ for date, or just в—„ if no env
set -g status-right "#(~/dotFiles/tmux-env.sh '#{pane_current_path}')#[bg=#4a4a4a,fg=#ffffff,bold] %a %b %-d #[fg=#8350C2,bg=#4a4a4a]о‚І#[bg=#8350C2,fg=#ffffff,bold] %l:%M %p #[bg=default,fg=#8350C2]о‚°"
set -g status-right-length 70

# в”Ђв”Ђ Window Status в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g window-status-separator ""
set -g window-status-format "  пЉ’ #I  #(~/dotFiles/tmux-dir.sh '#{pane_current_path}') "
set -g window-status-style "bg=default,fg=#666666"
# Active: opening diamond, dark-purple window#, purple dir, git (provides own transition)
set -g window-status-current-format "#[bg=default,fg=#5C27A3]о‚І#[bg=#5C27A3,fg=#ffffff,bold] пЉ’ #I #[bg=#8350C2,fg=#5C27A3]о‚°#[bg=#8350C2,fg=#ffffff,bold] #(~/dotFiles/tmux-dir.sh '#{pane_current_path}')#(~/dotFiles/tmux-git.sh '#{pane_current_path}')"
set -g window-status-current-style "bg=default,fg=#ffffff,bold"

# в”Ђв”Ђ Pane Borders в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g pane-border-style "fg=#4a4a4a"
set -g pane-active-border-style "fg=#8350C2"

# в”Ђв”Ђ Message / Command Line в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
set -g message-style "bg=#f5c211,fg=#2d1f00,bold"
set -g message-command-style "bg=#4a4a4a,fg=#ffffff"

# в”Ђв”Ђ Keybindings в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g mode-keys vi
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Config reloaded"
