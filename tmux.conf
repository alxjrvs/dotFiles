# tmux config — matches starship powerline theme
# Requires a Nerd Font (e.g. FiraCode Nerd Font)

# ── General ──────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 0
set -g history-limit 10000
set -g status 2

# ── Status Bar ────────────────────────────────────────────
# status 2 set above (enables two-row bar; "on" would reset to 1)
set -g status-position bottom
set -g status-interval 5
set -g status-justify centre
set -g status-style "bg=default fg=#ffffff overline"

set -g status-left "#[bg=default,fg=#8350C2]#[bg=#8350C2,fg=#ffffff] #(~/dotFiles/tmux-dir.sh '#{pane_current_path}') #(~/dotFiles/tmux-git.sh '#{pane_current_path}')"
set -g status-left-length 60

# Right: lang env (via script, handles own transition) | date | time
# tmux-env.sh outputs lang segments + opening ◄ for date, or just ◄ if no env
set -g status-right "#[bg=default,fg=#4a4a4a]#[bg=#4a4a4a,fg=#ffffff] %a %b %-d #[fg=#8350C2,bg=#4a4a4a]#[bg=#8350C2,fg=#ffffff] %l:%M %p #[bg=default,fg=#8350C2]"
set -g status-right-length 70

# ── Window Status ─────────────────────────────────────────────
set -g window-status-separator ""
set -g window-status-format "#(~/dotFiles/tmux-tab-color.sh open #{window_index}) [#I]#{?#{automatic_rename},, #W} #(~/dotFiles/tmux-tab-color.sh close #{window_index})"
set -g window-status-style "default"
# Active tab: script provides neighbor-aware arrow colors; glyphs come from script output
set -g window-status-current-format "#(~/dotFiles/tmux-tab-color.sh active-open #{window_index})#[bg=#c8a84b,fg=#1c1008,bold] [#I]#{?#{automatic_rename},, #W} #(~/dotFiles/tmux-tab-color.sh active-close #{window_index})"
set -g window-status-current-style "default"

# ── Pane Borders ──────────────────────────────────────────────
set -g pane-border-style "fg=#4a4a4a"
set -g pane-active-border-style "fg=#8350C2"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#[fg=#aaaaaa][#[fg=#c8a84b] #{?#{==:#{pane_title},#{host}},#I:#P,#{pane_title}} #[fg=#aaaaaa]] #[fg=#aaaaaa][#[fg=#8350C2] #{s|$HOME|~|:pane_current_path} #[fg=#aaaaaa]],#[fg=#666666][#[fg=#8a6f30] #{?#{==:#{pane_title},#{host}},#I:#P,#{pane_title}} #[fg=#666666]] #[fg=#666666][#[fg=#6344a0] #{s|$HOME|~|:pane_current_path} #[fg=#666666]]}"


# ── Message / Command Line ──────────────────────────────────────
set -g message-style "bg=#f5c211,fg=#2d1f00,bold"
set -g message-command-style "bg=#4a4a4a,fg=#ffffff"

# ── Keybindings ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g mode-keys vi
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# ── Plugins (TPM) ────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @continuum-restore 'on'

set -g status-format[0] "#[align=left]#[bg=default,fg=#f5c211,bold]#{?client_prefix, PREFIX ,}#[nobold,fg=#888888]#{?#{==:#{pane_current_command},zsh},,#{?client_prefix, | , }#{pane_current_command}}"
set -g status-format[1] "#[align=left range=left #{E:status-left-style}]#[push-default]#{T;=/#{status-left-length}:status-left}#[pop-default]#[norange default]#[list=on align=#{status-justify}]#[list=left-marker]<#[list=right-marker]>#[list=on]#{W:#[range=window|#{window_index} #{E:window-status-style}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-format}#[pop-default]#[norange default]#{?loop_last_flag,,#{window-status-separator}},#[range=window|#{window_index} list=focus #{?#{!=:#{E:window-status-current-style},default},#{E:window-status-current-style},#{E:window-status-style}}#{?#{&&:#{window_last_flag},#{!=:#{E:window-status-last-style},default}}, #{E:window-status-last-style},}#{?#{&&:#{window_bell_flag},#{!=:#{E:window-status-bell-style},default}}, #{E:window-status-bell-style},#{?#{&&:#{||:#{window_activity_flag},#{window_silence_flag}},#{!=:#{E:window-status-activity-style},default}}, #{E:window-status-activity-style},}}]#[push-default]#{T:window-status-current-format}#[pop-default]#[norange list=on default]#{?loop_last_flag,,#{window-status-separator}}}#[nolist align=right range=right #{E:status-right-style}]#[push-default]#{T;=/#{status-right-length}:status-right}#[pop-default]#[norange default]"
run '~/.tmux/plugins/tpm/tpm'
