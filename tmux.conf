# tmux config — Nova palette (theme.sh)
# Requires a Nerd Font (e.g. FiraCode Nerd Font)

# ── General ──────────────────────────────────────────────
set-environment -g PATH "/opt/homebrew/bin:/opt/homebrew/sbin:/usr/local/bin:/usr/bin:/bin:/usr/sbin:/sbin"
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on
set -g escape-time 10
set -g history-limit 50000
set -g focus-events on
set -g display-time 2000
set -g allow-rename off
set -g @max_windows 6
set -g allow-passthrough on    # Required for Claude and other tools using terminal escapes
set-option -g default-command 'exec "$SHELL" -l'
set -g status on

# ── Status Bar ────────────────────────────────────────────
set -g status-position bottom
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#686e84 fg=#f0f0f0"

set -g status-left ""
set -g status-left-length 60

# Right: cpu% / CPU \ memG / MEM \ bat% / BAT \ time / date
set -g status-right "#(~/dotFiles/tmux-scripts/tmux-powerline.sh status-right)"
set -g status-right-length 220

# ── Window Status ─────────────────────────────────────────────
# Colors come from @tab_open/@tab_close window options set by the hook script.
# Options are read synchronously — no caching delay on window switch.
set -g window-status-separator ""
set -g window-status-format "#[fg=#{?#{@tab_claude_blink},##D97757,#{@tab_inactive_color}},bg=default]#{?#{@tab_has_left},,}#[#{?#{@tab_claude_blink},bg=##D97757 fg=##f0f0f0,#{@tab_name_style}}] #I #{?#{@tab_show_name},#[bg=#{?#{@tab_claude_blink},##D97757,#{@tab_inactive_label_color}}]#[fg=#{@tab_inactive_color}]#[#{@tab_inactive_label_style}] #W #[fg=#{@tab_inactive_label_color}]#[bg=default],#[bg=#{?#{@tab_claude_blink},##D97757,#{@tab_inactive_label_color}}]#[fg=#{@tab_inactive_color}]#[#{@tab_inactive_label_style}] [#{b:pane_current_path}] #[fg=#{@tab_inactive_label_color}]#[bg=default]}"
set -g window-status-style "default"
set -g window-status-current-format "#[fg=#{@tab_dk_color},bg=default]#{?#{@tab_has_left},,}#[#{@tab_dk_style}] #I #{?#{@tab_show_name},#[bg=#{@tab_dk_color}]#[fg=#{@tab_name_color}]#[#{@tab_name_style}] #W #[fg=#{@tab_name_color}]#[bg=default],#[bg=#{@tab_dk_color}]#[fg=#{@tab_name_color}]#[#{@tab_name_style}] [#{b:pane_current_path}] #[fg=#{@tab_name_color}]#[bg=default]}"
set -g window-status-current-style "default"

# ── Pane Borders ──────────────────────────────────────────────
set -g pane-border-style "fg=#5a5a6a"
set -g pane-active-border-style "fg=#aa88ee"
set -g pane-border-status top
set -g pane-border-format "#{?pane_active,#(~/dotFiles/tmux-scripts/tmux-powerline.sh pane-border #{pane_current_path}),#[fg=#8866cc] #{s|$HOME|~|:pane_current_path} #[default]}"


# ── Message / Command Line ──────────────────────────────────────
set -g message-style "bg=#f5c211,fg=#2d1f00,bold"
set -g message-command-style "bg=#505a70,fg=#ffffff"

# Recompute tab colors immediately on window switch/open/close.
# Hook script sets per-window @tab_open/@tab_close options — read synchronously,
# so colors update instantly with no caching delay.
set-hook -g after-select-window 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g after-new-window 'if-shell "[ $(tmux list-windows | wc -l) -gt #{@max_windows} ]" "kill-window; display-message \"Max #{@max_windows} tabs\"" "run-shell \"~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors\""'
set-hook -g pane-exited 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g window-unlinked 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g after-new-session 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g client-session-changed 'run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors"'
set-hook -g pane-focus-in 'refresh-client -S'

# ── Keybindings ──────────────────────────────────────────────
unbind C-b
set -g prefix C-a
bind C-a send-prefix
set -g mode-keys vi
set -g status-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi V   send-keys -X select-line
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind -T copy-mode-vi /   send-keys -X search-forward
bind -T copy-mode-vi ?   send-keys -X search-backward
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c command-prompt -p "Tab name:" "new-window -a -c '#{pane_current_path}' -n '%%'"
bind r source-file ~/dotFiles/tmux.conf \; run-shell "~/dotFiles/tmux-scripts/tmux-powerline.sh tab-colors" \; display "dotFiles/tmux.conf reloaded"
# Window navigation
bind p select-window -p
bind n select-window -n
bind l select-window -l

# ── Claude ────────────────────────────────────────────────────────────────────
bind g popup -d '#{pane_current_path}' -w 85% -h 85% -E 'claude'
bind G new-window -c '#{pane_current_path}' 'claude'

# ── Plugins (TPM) ────────────────────────────────────────────────────────
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins'
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'omerxx/tmux-sessionx'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @plugin 'laktak/extrakto'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-copycat'

set -g @continuum-restore 'off'
set -g @resurrect-capture-pane-contents 'on'
set -g @sessionx-bind 'o'
set -g @floax-bind 'p'

run -b '~/.tmux/plugins/tpm/tpm'
