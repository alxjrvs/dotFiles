# Prompt: [user][path][branch] »
# Branch bg: green=clean, red=dirty
format = """$username$directory( \\[$nodejs$python$ruby$rust\\])${custom.branch_clean}${custom.branch_dirty} $character"""

add_newline = false

[username]
show_always = true
format = "\\[[$user]()\\]"

[directory]
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""
format = "\\[[$path]()\\]"

[git_branch]
disabled = true

[git_status]
disabled = true

[custom.branch_clean]
command = 'git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null'
when = 'git rev-parse --git-dir 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)"'
format = "\\[[ $output ](bg:#2d4a37 fg:#c8d6cf)\\]"
shell = ["zsh", "-f"]

[custom.branch_dirty]
command = 'git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null'
when = 'git rev-parse --git-dir 2>/dev/null && test -n "$(git status --porcelain 2>/dev/null)"'
format = "\\[[ $output ](bg:#4d2d2d fg:#d4a0a0)\\]"
shell = ["zsh", "-f"]

[character]
success_symbol = "[»](bold)"
error_symbol = "[»](bold red)"

[cmd_duration]
disabled = true

[nodejs]
format = "[$symbol$version]($style)"
symbol = "⏣ "
detect_files = ["package.json", ".node-version"]

[python]
format = "[$symbol$version]($style)"
symbol = "py "
detect_files = ["pyproject.toml", "requirements.txt"]

[ruby]
format = "[$symbol$version]($style)"
symbol = "rb "
detect_files = ["Gemfile", ".ruby-version"]

[rust]
format = "[$symbol$version]($style)"
symbol = "rs "
detect_files = ["Cargo.toml"]
