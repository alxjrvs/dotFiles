# starship prompt — minimalist: current directory + git branch + git status.
#
# Single line, colours only. Symbols (branch glyph, prompt character) use
# starship's built-in defaults, so no powerline glyphs ever live in this file.
# Everything not set here uses starship's defaults. Symlinked to
# ~/.config/starship.toml by `dot sync`.

add_newline = false
format = "$directory$git_branch$git_status$character"

[directory]
truncate_to_repo = true
truncation_length = 4
style = "bold cyan"

[git_branch]
style = "bold purple"

[git_status]
style = "bold yellow"
