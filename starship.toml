# Dark segment prompt ‚ÄĒ requires a Nerd Font (FiraCode Nerd Font)

format = """
[‚ē≠‚ĒÄ](fg:#a6e3a1 bold)[Óā≤](fg:#4a6785)$directory\
([Óāį](fg:#4a6785 bg:#7c5cbf)$git_branch\
([Óāį](fg:#7c5cbf bg:#f5c211)$git_status\
[Óāį](fg:#f5c211)))\
$custom\
($nodejs$python$ruby$rust)\
$line_break\
[‚ēį](fg:#a6e3a1 bold)$character"""

add_newline = true

[directory]
format = "[ $path ](bg:#4a6785 fg:#e4e8f0 bold)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

[git_branch]
format = "[ Óā† $branch ](bg:#7c5cbf fg:#e4e8f0 bold)"

[git_status]
format = "([ $all_status$ahead_behind ](bg:#f5c211 fg:#1e1e2e bold))"
staged = "+"
modified = "!"
deleted = "‚úė"
renamed = "¬Ľ"
untracked = "?"
conflicted = "="
ahead = "‚á°"
behind = "‚á£"
diverged = "‚áē"
stashed = "$"

# Closer arrow for directory when not in a git repo
[custom.dir_closer]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[Óāį](fg:#4a6785)"
shell = ["sh"]

[character]
success_symbol = "[‚ĚĮ](fg:#a6e3a1 bold)"
error_symbol = "[‚ĚĮ](fg:#f38ba8 bold)"

[cmd_duration]
disabled = true

# --- Language versions ---

[nodejs]
format = " [Óúė](fg:#a6e3a1 bold)[ v$version](fg:#a6e3a1 bold)"
symbol = ""
detect_files = ["package.json", ".node-version", ".nvmrc"]

[python]
format = " [Óúľ](fg:#f9e2af bold)[ v$version](fg:#f9e2af bold)"
symbol = ""
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[ruby]
format = " [ÓúĻ](fg:#f38ba8 bold)[ v$version](fg:#f38ba8 bold)"
symbol = ""
detect_files = ["Gemfile", ".ruby-version"]

[rust]
format = " [Óě®](fg:#cba6f7 bold)[ v$version](fg:#cba6f7 bold)"
symbol = ""
detect_files = ["Cargo.toml"]
