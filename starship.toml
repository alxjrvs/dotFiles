# Gnar prompt — purple — requires a Nerd Font

format = """
$directory\
(${custom.git_branch})\
(${custom.pip_stash}${custom.pip_dirty}${custom.pip_unpushed}${custom.pip_clean})\
 """

add_newline = true

[directory]
format = "[ $path ](bg:#57436e fg:#f0f0f0)[](fg:#57436e)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

[custom.git_branch]
command = "git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[](bg:#494949 fg:#282c34)[  $output ](bg:#494949 fg:#f0f0f0)[](fg:#494949)"
shell = ["sh"]

[custom.pip_stash]
command = "true"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && git stash list 2>/dev/null | grep -q ."""
format = "[](bg:#5f87af fg:#282c34)[](fg:#5f87af)"
shell = ["sh"]

[custom.pip_dirty]
command = "true"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && git status --porcelain 2>/dev/null | grep -q ."""
format = "[](bg:#c05050 fg:#282c34)[](fg:#c05050)"
shell = ["sh"]

[custom.pip_unpushed]
command = "true"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && git rev-parse @{u} 2>/dev/null && git log @{u}.. --oneline 2>/dev/null | grep -q ."""
format = "[](bg:#8a6f2a fg:#282c34)[](fg:#8a6f2a)"
shell = ["sh"]

[custom.pip_clean]
command = "true"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && ! git log @{u}.. --oneline 2>/dev/null | grep -q ."""
format = "[](bg:#2e8b57 fg:#282c34)[](fg:#2e8b57)"
shell = ["sh"]


[character]
disabled = true

[cmd_duration]
disabled = true
