# Nord prompt — requires a Nerd Font
# Powerline: REPO or DIR (PN2) -> BRANCH (SS1) -> git pips
# Matches Claude statusline line 1 layout

format = """${custom.prompt_head}${custom.git_segment} """

add_newline = false
command_timeout = 500

[custom.prompt_head]
command = "~/dotFiles/starship-scripts/prompt-repo-dir.sh"
when = true
format = "$output"
shell = ["sh"]

[custom.git_segment]
command = "~/dotFiles/starship-scripts/git-powerline.sh"
when = true
format = "$output"
shell = ["sh"]


[cmd_duration]
disabled = true
