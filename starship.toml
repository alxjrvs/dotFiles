# starship prompt â€” echoes the Claude statusline's visual grammar:
# a bold near-white identity (cwd), then muted-bracketed git chips whose
# colors match the statusline (branch = blue, untracked = cyan, stashes =
# magenta, additions = green, deletions = red). Nerd-font glyphs throughout.
# Symlinked to ~/.config/starship.toml by `dot sync`.

add_newline = false
format = "$directory$git_branch$git_status$character"

# Identity: bold near-white, unbracketed â€” mirrors statusline line 1, which
# leads with the repo/dir and brackets only the chips that follow.
[directory]
truncate_to_repo = true
truncation_length = 4
style = "bold white"
read_only = " "
read_only_style = "red"

# Branch chip: muted [ ] around a blue   + name (statusline's GLYPH_BRANCH).
[git_branch]
symbol = " "
style = "blue"
format = '[\[](bright-black)[$symbol$branch]($style)[\]](bright-black) '

# Status chip: one muted [ ] around per-state glyphs, each colored to match
# the statusline (untracked cyan, stashes magenta, +/- green/red, branch-blue
# ahead/behind). The whole chip disappears on a clean tree.
[git_status]
format = '([\[](bright-black)$conflicted$staged$modified$deleted$renamed$untracked$stashed$ahead$behind$diverged[\]](bright-black) )'
conflicted = '[~$count](red)'
staged     = '[+$count](green)'
modified   = '[!$count](yellow)'
deleted    = '[-$count](red)'
renamed    = '[Â»$count](purple)'
untracked  = '[?$count](cyan)'
stashed    = '[*$count](purple)'
ahead      = '[â‡¡$count](blue)'
behind     = '[â‡£$count](blue)'
diverged   = '[â‡¡$ahead_countâ‡£$behind_count](blue)'
