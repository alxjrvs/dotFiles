# Dark segment prompt ÔÇö requires a Nerd Font (FiraCode Nerd Font)

format = """
[Ôò¡ÔöÇ](fg:#a6e3a1 bold)$directory\
$git_branch\
$git_status\
($nodejs$python$ruby$rust)\
$line_break\
[Ôò░](fg:#a6e3a1 bold)$character"""

add_newline = false

[directory]
format = "[¯é▓](fg:#45475a)[ $path ](bg:#45475a fg:#cdd6f4 bold)[¯é░](fg:#45475a)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

[git_branch]
format = "[ ¯éá $branch ](bg:#393552 fg:#cba6f7 bold)[¯é░](fg:#393552)"

[git_status]
format = "([ $all_status$ahead_behind ](bg:#f9e2af fg:#1e1e2e bold)[¯é░](fg:#f9e2af))"
staged = "+"
modified = "!"
deleted = "Ô£İ"
renamed = "┬╗"
untracked = "?"
conflicted = "="
ahead = "Ôçí"
behind = "Ôçú"
diverged = "Ôçò"
stashed = "$"

[character]
success_symbol = "[ÔØ»](fg:#a6e3a1 bold)"
error_symbol = "[ÔØ»](fg:#f38ba8 bold)"

[cmd_duration]
disabled = true

# --- Language versions ---

[nodejs]
format = " [¯£İ](fg:#a6e3a1 bold)[ v$version](fg:#a6e3a1 bold)"
symbol = ""
detect_files = ["package.json", ".node-version", ".nvmrc"]

[python]
format = " [¯£╝](fg:#f9e2af bold)[ v$version](fg:#f9e2af bold)"
symbol = ""
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[ruby]
format = " [¯£╣](fg:#f38ba8 bold)[ v$version](fg:#f38ba8 bold)"
symbol = ""
detect_files = ["Gemfile", ".ruby-version"]

[rust]
format = " [¯Ş¿](fg:#cba6f7 bold)[ v$version](fg:#cba6f7 bold)"
symbol = ""
detect_files = ["Cargo.toml"]
