# Nord prompt — requires a Nerd Font
# Powerline: REPO or DIR (PN2) -> BRANCH (SS1) -> git pips
# Matches Claude statusline line 1 layout

format = """${custom.prompt_head}${custom.git_segment}
$character"""

add_newline = true
command_timeout = 1000

[custom.prompt_head]
command = "~/dotFiles/starship-scripts/prompt-repo-dir.sh"
when = "true"
format = "$output"
shell = ["sh"]
ignore_timeout = true

[custom.git_segment]
command = "~/dotFiles/starship-scripts/git-powerline.sh"
when = "true"
format = "$output"
shell = ["sh"]
ignore_timeout = true

[character]
success_symbol = "[╰─](fg:#ECEFF4) [❯](fg:#ECEFF4)"
error_symbol = "[╰─](fg:#ECEFF4) [❯](fg:#BF616A)"

[cmd_duration]
disabled = true
