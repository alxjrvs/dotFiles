# Jack Kirby CMYK prompt ‚ÄĒ requires a Nerd Font

format = """
[‚ē≠‚ĒÄ](fg:#1a8fa0 bold)[Óā≤](fg:#1a8fa0)$directory\
([Óāį](fg:#1a8fa0 bg:#b83d9e)$git_branch\
([Óāį](fg:#b83d9e bg:#f5c211)$git_status\
[Óāį](fg:#f5c211))\
${custom.git_clean})\
${custom.dir_closer}\
($nodejs$python$ruby$rust)\
$line_break\
[‚ēį](fg:#1a8fa0 bold)$character"""

add_newline = true

[directory]
format = "[ $path ](bg:#1a8fa0 fg:#e4e8f0 bold)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

[git_branch]
format = "[ Óā† $branch ](bg:#b83d9e fg:#e4e8f0 bold)"

[git_status]
format = "([ $all_status$ahead_behind ](bg:#f5c211 fg:#1e1e2e bold))"
staged = "+"
modified = "!"
deleted = "‚úė"
renamed = "¬Ľ"
untracked = "?"
conflicted = "="
ahead = "‚á°"
behind = "‚á£"
diverged = "‚áē"
stashed = "\\$"

# Green checkmark when git working tree is clean and in sync with remote
[custom.git_clean]
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && test -z "$(git stash list 2>/dev/null)" && { ! git rev-parse --verify @{u} >/dev/null 2>&1 || { test "$(git rev-list --count @{u}..HEAD 2>/dev/null)" = "0" && test "$(git rev-list --count HEAD..@{u} 2>/dev/null)" = "0"; }; }"""
format = "[Óāį](fg:#b83d9e bg:#2e8b57)[ ‚úď ](bg:#2e8b57 fg:#e4e8f0 bold)[Óāį](fg:#2e8b57)"
shell = ["sh"]

# Closer arrow for directory when not in a git repo
[custom.dir_closer]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[Óāį](fg:#1a8fa0)"
shell = ["sh"]

[character]
success_symbol = "[‚ĚĮ](fg:#1a8fa0 bold)"
error_symbol = "[‚ĚĮ](fg:#b83d9e bold)"

[cmd_duration]
disabled = true

# --- Language versions ---

[nodejs]
format = " [Óúė](fg:#1a8fa0 bold)[ v$version](fg:#1a8fa0 bold)"
symbol = ""
detect_files = ["package.json", ".node-version", ".nvmrc"]

[python]
format = " [Óúľ](fg:#d4b84a bold)[ v$version](fg:#d4b84a bold)"
symbol = ""
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[ruby]
format = " [ÓúĻ](fg:#b83d9e bold)[ v$version](fg:#b83d9e bold)"
symbol = ""
detect_files = ["Gemfile", ".ruby-version"]

[rust]
format = " [Óě®](fg:#c87040 bold)[ v$version](fg:#c87040 bold)"
symbol = ""
detect_files = ["Cargo.toml"]
