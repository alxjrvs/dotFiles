# Nord prompt — requires a Nerd Font
# Colors: Nord palette — Dir=Nord10 #5E81AC, Branch=Nord3 #4C566A, BG=Nord0 #2E3440

format = """

$directory(${custom.git_segment})(${custom.prompt_char})"""

add_newline = true
command_timeout = 1000

[directory]
format = "[ $path ](bg:#3B4252 fg:#ECEFF4)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

[custom.git_segment]
command = "~/dotFiles/starship-scripts/git-powerline.sh"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "$output"
shell = ["sh"]

[custom.prompt_char]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[ ❯](fg:#A3BE8C) "
shell = ["sh"]

[cmd_duration]
disabled = true
