# Gnar prompt â€” purple â€” requires a Nerd Font

format = """
[î‚²](fg:#4a4a4a)$directory\
([î‚°](fg:#4a4a4a bg:#A884D4)$git_branch\
([î‚°](fg:#A884D4 bg:#f5c211)$git_status\
[î‚°](fg:#f5c211 bg:default))\
${custom.git_clean})\
${custom.dir_closer}\
$fill\
($nodejs$python$ruby$rust)\
$fill\
${custom.date}${custom.time}\
$line_break\
$line_break\
$character"""

add_newline = true

[directory]
format = "[ $path ](bg:#4a4a4a fg:#ffffff)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

[git_branch]
format = "[ î‚  $branch ](bg:#A884D4 fg:#ffffff)"

[git_status]
format = "([ $all_status$ahead_behind ](bg:#f5c211 fg:#2d1f00))"
staged = "+"
modified = "!"
deleted = "âœک"
renamed = "آ»"
untracked = "?"
conflicted = "="
ahead = "â‡،"
behind = "â‡£"
diverged = "â‡•"
stashed = "\\$"

# Green checkmark when git working tree is clean and in sync with remote
[custom.git_clean]
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && test -z "$(git stash list 2>/dev/null)" && { ! git rev-parse --verify @{u} >/dev/null 2>&1 || { test "$(git rev-list --count @{u}..HEAD 2>/dev/null)" = "0" && test "$(git rev-list --count HEAD..@{u} 2>/dev/null)" = "0"; }; }"""
format = "[î‚°](fg:#A884D4 bg:#2e8b57)[ âœ“ ](bg:#2e8b57 fg:#ffffff)[î‚°](fg:#2e8b57)"
shell = ["sh"]

# Closer arrow for directory when not in a git repo
[custom.dir_closer]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[î‚°](fg:#4a4a4a)"
shell = ["sh"]

[character]
success_symbol = "[â‌¯](fg:#fb543a)"
error_symbol = "[â‌¯](fg:#cc3333)"

# Transient prompt â€” collapse previous prompts to just the character
[profiles]
transient = "$character"

[cmd_duration]
disabled = true

[fill]
symbol = "â”€"
style = "fg:#4a4a4a"


# --- Language versions ---

[nodejs]
format = "[î‚²](fg:#2d6b2e)[ node ](bg:#2d6b2e fg:#ffffff)[î‚²](fg:#3C873A bg:#2d6b2e)[ $version ](bg:#3C873A fg:#ffffff)[î‚°](fg:#3C873A)"
symbol = ""
detect_files = ["package.json", ".node-version", ".nvmrc"]

[python]
format = "[î‚²](fg:#2a5a85)[ python ](bg:#2a5a85 fg:#ffffff)[î‚²](fg:#3776AB bg:#2a5a85)[ $version ](bg:#3776AB fg:#ffffff)[î‚°](fg:#3776AB)"
symbol = ""
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[ruby]
format = "[î‚²](fg:#9c2822)[ ruby ](bg:#9c2822 fg:#ffffff)[î‚²](fg:#CC342D bg:#9c2822)[ $version ](bg:#CC342D fg:#ffffff)[î‚°](fg:#CC342D)"
symbol = ""
detect_files = ["Gemfile", ".ruby-version"]

[rust]
format = "[î‚²](fg:#9e3220)[ rust ](bg:#9e3220 fg:#ffffff)[î‚²](fg:#CE422B bg:#9e3220)[ $version ](bg:#CE422B fg:#ffffff)[î‚°](fg:#CE422B)"
symbol = ""
detect_files = ["Cargo.toml"]

# Date and time on the right side (replacing no_lang)
[custom.date]
command = "date '+%a %b %-d'"
when = "true"
format = "[î‚²](fg:#4a4a4a)[ $output ](bg:#4a4a4a fg:#ffffff)"
shell = ["sh"]

[custom.time]
command = "date '+%-I:%M %p'"
when = "true"
format = "[î‚²](fg:#A884D4 bg:#4a4a4a)[ $output ](bg:#A884D4 fg:#ffffff)[î‚°](fg:#A884D4)"
shell = ["sh"]
