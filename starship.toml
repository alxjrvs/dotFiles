# Gnar prompt — purple — requires a Nerd Font

format = """
[](fg:#4a4a4a)$directory\
(${custom.git_clean}${custom.git_dirty}${custom.git_nosync})\
${custom.dir_closer}\
$line_break\
$line_break\
$character"""

add_newline = true

[directory]
format = "[ $path ](bg:#4a4a4a fg:#f0f0f0)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

# Git is clean and in sync (or no remote)
[custom.git_clean]
command = "git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && test -z "$(git stash list 2>/dev/null)" && { ! git rev-parse --verify @{u} >/dev/null 2>&1 || { test "$(git rev-list --count @{u}..HEAD 2>/dev/null)" = "0" && test "$(git rev-list --count HEAD..@{u} 2>/dev/null)" = "0"; }; }"""
format = "[](fg:#4a4a4a bg:#2e8b57)[  $output ](bg:#2e8b57 fg:#f0f0f0)[](fg:#2e8b57)"
shell = ["sh"]

# Git has uncommitted changes
[custom.git_dirty]
command = "git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -n "$(git status --porcelain 2>/dev/null)" """
format = "[](fg:#4a4a4a bg:#8a6f2a)[  $output ](bg:#8a6f2a fg:#f0f0f0)[](fg:#8a6f2a)"
shell = ["sh"]

# Git is clean but has stash or out of sync with remote
[custom.git_nosync]
command = "git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && { test -n "$(git stash list 2>/dev/null)" || { git rev-parse --verify @{u} >/dev/null 2>&1 && ! { test "$(git rev-list --count @{u}..HEAD 2>/dev/null)" = "0" && test "$(git rev-list --count HEAD..@{u} 2>/dev/null)" = "0"; }; }; }"""
format = "[](fg:#4a4a4a bg:#a06030)[  $output ](bg:#a06030 fg:#f0f0f0)[](fg:#a06030)"
shell = ["sh"]

# Closer arrow for directory when not in a git repo
[custom.dir_closer]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[](fg:#4a4a4a)"
shell = ["sh"]

[character]
success_symbol = "[❯](fg:#fb543a)"
error_symbol = "[❯](fg:#cc3333)"

# Transient prompt — collapse previous prompts to just the character
[profiles]
transient = "$character"

[cmd_duration]
disabled = true
