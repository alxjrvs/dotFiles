# Gnar prompt — purple — requires a Nerd Font

format = """
(fg:#4a4a4a)$directory\
(${custom.git_clean}${custom.git_dirty}${custom.git_nosync})\
${custom.dir_closer}\
$line_break\
$line_break\
$character"""

add_newline = true

[directory]
format = "[ $path ](bg:#4a4a4a fg:#f0f0f0)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

# Local is clean and equal to remote
[custom.git_clean]
command = "git branch --show-current 2>/dev/null || git rev-parse --short HEAD 2>/dev/null"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && test -z "$(git stash list 2>/dev/null)" && { ! git rev-parse --verify @{u} >/dev/null 2>&1 || { test "$(git rev-list --count @{u}..HEAD 2>/dev/null)" = "0" && test "$(git rev-list --count HEAD..@{u} 2>/dev/null)" = "0"; }; }"""
format = "[](fg:#4a4a4a bg:#2e8b57)[ ✓ $output ](bg:#2e8b57 fg:#f0f0f0)[](fg:#2e8b57)"
shell = ["sh"]

# Uncommitted changes in working tree
[custom.git_dirty]
command = """
b=$(git branch --show-current 2>/dev/null)
[ -z "$b" ] && b=$(git rev-parse --short HEAD 2>/dev/null)
p=$(git status --porcelain 2>/dev/null)
s=""
printf '%s' "$p" | grep -q '^[MADRCU]' 2>/dev/null && s="${s}+"
printf '%s' "$p" | grep -q '^.[MD]' 2>/dev/null && s="${s}!"
printf '%s' "$p" | grep -q '^??' 2>/dev/null && s="${s}?"
[ -n "$s" ] && printf '%s %s' "$b" "$s" || printf '%s' "$b"
"""
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -n "$(git status --porcelain 2>/dev/null)"  """
format = "[](fg:#4a4a4a bg:#c03030)[  $output ](bg:#c03030 fg:#f0f0f0)[](fg:#c03030)"
shell = ["sh"]

# Committed but not pushed, or has stash
[custom.git_nosync]
command = """
b=$(git branch --show-current 2>/dev/null)
[ -z "$b" ] && b=$(git rev-parse --short HEAD 2>/dev/null)
s=""
if git rev-parse --verify @{u} >/dev/null 2>&1; then
  a=$(git rev-list --count @{u}..HEAD 2>/dev/null || echo 0)
  d=$(git rev-list --count HEAD..@{u} 2>/dev/null || echo 0)
  [ "$a" -gt 0 ] && s="${s}⇡${a}"
  [ "$d" -gt 0 ] && s="${s}⇣${d}"
fi
[ -n "$s" ] && printf '%s %s' "$b" "$s" || printf '%s' "$b"
"""
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && { test -n "$(git stash list 2>/dev/null)" || { git rev-parse --verify @{u} >/dev/null 2>&1 && ! { test "$(git rev-list --count @{u}..HEAD 2>/dev/null)" = "0" && test "$(git rev-list --count HEAD..@{u} 2>/dev/null)" = "0"; }; }; }"""
format = "[](fg:#4a4a4a bg:#b08800)[  $output ](bg:#b08800 fg:#f0f0f0)[](fg:#b08800)"
shell = ["sh"]

# Closer arrow when not in a git repo
[custom.dir_closer]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[](fg:#4a4a4a)"
shell = ["sh"]

[character]
success_symbol = "[❯](fg:#fb543a)"
error_symbol = "[❯](fg:#cc3333)"

# Transient prompt — collapse previous prompts to just the character
[profiles]
transient = "$character"

[cmd_duration]
disabled = true
