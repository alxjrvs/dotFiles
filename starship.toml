# Gnar prompt — purple — requires a Nerd Font

format = """

$directory(${custom.git_segment})$character"""

add_newline = true
command_timeout = 1000

[directory]
format = "[ $path ](bg:#a86828 fg:#f0f0f0)[](fg:#a86828)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

[custom.git_segment]
command = "~/dotFiles/starship-scripts/git-powerline.sh"
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
format = "$output"
shell = ["sh"]

[character]
success_symbol = " "
error_symbol = " "

[cmd_duration]
disabled = true
