# Gnar prompt ‚ÄĒ purple ‚ÄĒ requires a Nerd Font

format = """
[‚ē≠‚ĒÄ](fg:#8350C2 bold)[Óā≤](fg:#8350C2)$directory\
([Óāį](fg:#8350C2 bg:#4a4a4a)$git_branch\
([Óāį](fg:#4a4a4a bg:#f5c211)$git_status\
[Óāį](fg:#f5c211))\
${custom.git_clean})\
${custom.dir_closer}\
($nodejs$python$ruby$rust)\
$line_break\
[‚ēį](fg:#8350C2 bold)$character"""

add_newline = true

[directory]
format = "[ $path ](bg:#8350C2 fg:#d4c0ee bold)"
truncation_length = 2
truncate_to_repo = false
truncation_symbol = ""

[git_branch]
format = "[ Óā† $branch ](bg:#4a4a4a fg:#b0b0b0 bold)"

[git_status]
format = "([ $all_status$ahead_behind ](bg:#f5c211 fg:#5a4400 bold))"
staged = "+"
modified = "!"
deleted = "‚úė"
renamed = "¬Ľ"
untracked = "?"
conflicted = "="
ahead = "‚á°"
behind = "‚á£"
diverged = "‚áē"
stashed = "\\$"

# Green checkmark when git working tree is clean and in sync with remote
[custom.git_clean]
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && test -z "$(git stash list 2>/dev/null)" && { ! git rev-parse --verify @{u} >/dev/null 2>&1 || { test "$(git rev-list --count @{u}..HEAD 2>/dev/null)" = "0" && test "$(git rev-list --count HEAD..@{u} 2>/dev/null)" = "0"; }; }"""
format = "[Óāį](fg:#4a4a4a bg:#2e8b57)[ ‚úď ](bg:#2e8b57 fg:#b5e4cb bold)[Óāį](fg:#2e8b57)"
shell = ["sh"]

# Closer arrow for directory when not in a git repo
[custom.dir_closer]
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[Óāį](fg:#8350C2)"
shell = ["sh"]

[character]
success_symbol = "[‚ĚĮ](fg:#8350C2 bold)"
error_symbol = "[‚ĚĮ](fg:#cc3333 bold)"

[cmd_duration]
disabled = true

# --- Language versions ---

[nodejs]
format = " [Óúė](fg:#8350C2 bold)[ v$version](fg:#8350C2 bold)"
symbol = ""
detect_files = ["package.json", ".node-version", ".nvmrc"]

[python]
format = " [Óúľ](fg:#8350C2 bold)[ v$version](fg:#8350C2 bold)"
symbol = ""
detect_files = ["pyproject.toml", "requirements.txt", ".python-version"]

[ruby]
format = " [ÓúĻ](fg:#8350C2 bold)[ v$version](fg:#8350C2 bold)"
symbol = ""
detect_files = ["Gemfile", ".ruby-version"]

[rust]
format = " [Óě®](fg:#8350C2 bold)[ v$version](fg:#8350C2 bold)"
symbol = ""
detect_files = ["Cargo.toml"]
