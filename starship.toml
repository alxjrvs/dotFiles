# Prompt: parent/cwd [branchā—¸] Ā»
# Git dot: green=clean, red=uncommitted, yellow=staged/unpushed
format = """$directory( \\[$nodejs$python$ruby$rust\\])$git_branch${custom.git_dot}$cmd_duration $character"""

add_newline = false

[directory]
truncation_length = 2
truncation_symbol = ""
format = "[$path]()"

[git_branch]
format = " [\\[$branch]()"

[git_status]
disabled = true

[custom.git_dot]
description = "Git status dot indicator"
command = '''
if ! git diff --quiet 2>/dev/null || [ -n "$(git ls-files --others --exclude-standard 2>/dev/null)" ]; then
  echo "red"
elif ! git diff --cached --quiet 2>/dev/null || [ "$(git rev-list --count @{u}..HEAD 2>/dev/null || echo 0)" -gt 0 ]; then
  echo "yellow"
else
  echo "green"
fi
'''
when = "git rev-parse --git-dir 2>/dev/null"
format = "[ā—¸](${output})\\]"
shell = ["bash", "--nologin"]

[character]
success_symbol = "[Ā»](bold)"
error_symbol = "[Ā»](bold red)"

[cmd_duration]
min_time = 2_000
format = " [$duration]($style)"
style = "yellow dimmed"

[nodejs]
format = "[$symbol$version]($style)"
symbol = "ā¸£ "
detect_files = ["package.json", ".node-version"]

[python]
format = "[$symbol$version]($style)"
symbol = "py "
detect_files = ["pyproject.toml", "requirements.txt"]

[ruby]
format = "[$symbol$version]($style)"
symbol = "rb "
detect_files = ["Gemfile", ".ruby-version"]

[rust]
format = "[$symbol$version]($style)"
symbol = "rs "
detect_files = ["Cargo.toml"]
