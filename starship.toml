# Nord prompt — requires a Nerd Font
# Powerline: REPO or DIR (PN2) -> BRANCH (SS1) -> git pips
# Matches Claude statusline line 1 layout

format = """${custom.prompt_head}${custom.git_segment}
$character"""

add_newline = true
command_timeout = 1000

[custom.prompt_head]
command = "~/dotFiles/starship-scripts/prompt-repo-dir.sh"
when = "true"
format = "$output"
shell = ["sh"]
ignore_timeout = true

[custom.git_segment]
command = "~/dotFiles/starship-scripts/git-powerline.sh"
when = "true"
format = "$output"
shell = ["sh"]
ignore_timeout = true

[character]
success_symbol = "[](fg:#D8DEE9)[](fg:#D8DEE9 bg:#D5DBE6)[](fg:#D5DBE6 bg:#CBD2DD)[](fg:#CBD2DD bg:#BCC2CE)[](fg:#BCC2CE bg:#A5ACB8)[](fg:#A5ACB8 bg:#89909D)[](fg:#89909D)"
error_symbol = "[](fg:#BF616A)[     ](bg:#BF616A)[](fg:#BF616A)"

[cmd_duration]
disabled = true
