# Minimal starship config for use inside tmux
# Prompt character colored by git status severity: red > yellow > green

format = "${custom.prompt}$character"
add_newline = false

[custom.prompt]
command = "~/dotFiles/starship-scripts/git-prompt-color.sh"
when = "true"
format = "[❯]($output) "
shell = ["sh"]

[character]
# Hidden when custom.prompt runs; fallback for edge cases
success_symbol = ""
error_symbol = ""

[cmd_duration]
disabled = true
