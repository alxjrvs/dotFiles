# Minimal starship config for use inside tmux
# Character color reflects git status (most severe wins: red > yellow > green)

format = """${custom.char_dirty}\
${custom.char_unpushed}\
${custom.char_clean}\
${custom.char_nogit}"""

add_newline = false

# Red: dirty working tree (uncommitted changes) — highest severity
[custom.char_dirty]
command = "true"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && git status --porcelain 2>/dev/null | grep -q ."""
format = "[❯](fg:#e06c75 bold) "
shell = ["sh"]

# Yellow: clean but unpushed commits
[custom.char_unpushed]
command = "true"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && git rev-parse --abbrev-ref --symbolic-full-name @{u} >/dev/null 2>&1 && git log @{u}.. --oneline 2>/dev/null | grep -q ."""
format = "[❯](fg:#e5c07b bold) "
shell = ["sh"]

# Green: clean and up-to-date
[custom.char_clean]
command = "true"
when = """git rev-parse --is-inside-work-tree 2>/dev/null && test -z "$(git status --porcelain 2>/dev/null)" && ! git log @{u}.. --oneline 2>/dev/null | grep -q ."""
format = "[❯](fg:#98c379 bold) "
shell = ["sh"]

# Default: not in a git repo
[custom.char_nogit]
command = "true"
when = "! git rev-parse --is-inside-work-tree 2>/dev/null"
format = "[❯](fg:#fb543a bold) "
shell = ["sh"]

[character]
disabled = true

[cmd_duration]
disabled = true
