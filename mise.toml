# mise.toml — language toolchains + ALL dev CLIs.
#
# Policy (Lean A): the Brewfile holds `brew "mise"` + casks only. Every
# dev CLI lives here. Single update path: `mise upgrade`. PATH includes
# `~/.local/share/mise/shims` via `.zshenv` so tools resolve in every
# shell context (interactive, non-interactive, git hooks, editor
# subprocesses) without waiting for `mise activate`.
#
# Resolution order: registry short-name first (verified with `mise
# registry <name>`); fall back to `aqua:owner/repo` then `github:`/`cargo:`
# when the registry doesn't cover or the registry alias is broken.

[tools]
# Only tools worth installing globally on every machine live here. Anything
# situational (a language toolchain for one project, a one-off CLI) is
# installed incidentally — `mise use <tool>` in that project, or on demand.

# ── Language toolchains ───────────────────────────────────────────────
node = "25"
bun = "latest"

# ── Shell-init-time tools (need PATH presence before zsh fragments load) ─
sheldon = "latest"      # zsh plugin manager — loaded in zsh/30-plugins.zsh
                        # NOTE: links against /opt/homebrew/opt/openssl@3/lib —
                        # ensure `openssl@3` is in Brewfile or the binary segfaults.
atuin = "latest"        # shell history sync — loaded in zsh/30-plugins.zsh
fzf = "latest"          # `fzf --zsh` integration loaded in zsh/60-tools.zsh
starship = "latest"     # prompt — `starship init zsh` loaded in zsh/50-prompt.zsh

# ── Git surface (used by prompt, lefthook, pre-commit) ────────────────
gh = "latest"           # GH CLI; also feeds the GitHub MCP auth header
delta = "latest"        # syntax-aware git pager
gitleaks = "latest"     # gitleaks protect — global pre-commit hook
lefthook = "latest"     # repo-local pre-commit/pre-push runner

# ── File / text / data tools ──────────────────────────────────────────
bat = "latest"
fd = "latest"
ripgrep = "latest"
jq = "latest"
eza = "latest"

# ── Linters / formatters ─────────────────────────────────────────────
shfmt = "latest"
shellcheck = "latest"

# ── Neovim language servers (nvim/init.lua wires these in) ────────────
# rust-analyzer is not global — it comes with a per-project `rust` toolchain,
# and nvim/init.lua picks it up automatically when present.
"npm:bash-language-server" = "latest"
"npm:typescript-language-server" = "latest"
"npm:prettier" = "latest"                 # JS/TS/JSX/TSX formatter (nvim/init.lua format-on-save)
"aqua:artempyanykh/marksman" = "latest"   # markdown LSP
taplo = "latest"                          # TOML LSP + formatter (`taplo lsp stdio`); registry alias → aqua:tamasfe/taplo (no -cli suffix)

# ── Editor ────────────────────────────────────────────────────────────
neovim = "latest"                         # modal editor (binary: nvim)

# Global-only [settings] (e.g. trusted_config_paths) live in mise-settings.toml,
# symlinked to ~/.config/mise/conf.d/. They can't live here: this file is also
# loaded as the repo's project-local config, where mise ignores+warns on
# global-only settings.
