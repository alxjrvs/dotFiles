# tmux config — minimal, no plugins. Vi-mode friendly. Symlinked to ~/.config/tmux/tmux.conf.

# -- Prefix --------------------------------------------------------------
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Terminal capabilities ----------------------------------------------
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",ghostty:RGB"
set -as terminal-overrides ",*:Tc"
set -g escape-time 0
set -g focus-events on

# -- Behavior ------------------------------------------------------------
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g set-clipboard on
set -g display-time 2000

# -- Vi mode -------------------------------------------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

# -- Splits keep CWD -----------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# -- Vi-style pane nav ---------------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# -- Reload --------------------------------------------------------------
bind r source-file ~/.config/tmux/tmux.conf \; display "tmux.conf reloaded"

# -- Status bar (minimal, Nord-ish to match shell) -----------------------
set -g status-position top
set -g status-style "bg=#2e3440,fg=#d8dee9"
set -g status-left-length 40
set -g status-left "#[bg=#5e81ac,fg=#2e3440,bold] #S #[bg=#2e3440,fg=#5e81ac]"
set -g status-right "#[fg=#4c566a]#[bg=#4c566a,fg=#d8dee9] %Y-%m-%d %H:%M "
set -g window-status-current-style "bg=#88c0d0,fg=#2e3440,bold"
set -g window-status-format " #I:#W "
set -g window-status-current-format " #I:#W "
