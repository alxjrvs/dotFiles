gui:
  theme:
    lightTheme: false
    activeBorderColor:
      - "#88c0d0"
      - bold
    inactiveBorderColor:
      - "#4c566a"
    selectedLineBgColor:
      - "#3b4252"
    optionsTextColor:
      - "#81a1c1"
    cherryPickedCommitFgColor:
      - "#2e3440"
    cherryPickedCommitBgColor:
      - "#a3be8c"
  nerdFontsVersion: "3"
  showCommandLog: false
  showIcons: true
  sidePanelWidth: 0.3333
  expandFocusedSidePanel: true
git:
  paging:
    colorArg: always
    pager: delta --paging=never --side-by-side
  commit:
    signOff: false
  fetchAll: true
os:
  edit: "nvim {{filename}}"
  editAtLine: "nvim +{{line}} {{filename}}"
keybinding:
  universal:
    quit: "q"
    return: "<esc>"

# Custom commands wire shell-installed tools into the lazygit UI where
# they're most ergonomic. Worktree management is built into lazygit since
# v0.40 (`w` in the branches panel) — no custom binding needed.
customCommands:
  # git absorb is in mise (aqua:tummychow/git-absorb) and aliased as `gab`
  # in zsh; this surfaces it in the files panel where staged hunks are
  # visible. Auto-fixups staged changes against the right history commit
  # then squash-rebases.
  - key: "A"
    context: "files"
    description: "git absorb --and-rebase"
    command: "git absorb --and-rebase"
    loadingText: "Absorbing staged hunks..."
    output: "popup"
