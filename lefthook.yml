# Lefthook config for this repo (dotfiles itself).
#
# Wires shellcheck + shfmt as a pre-commit gate on staged shell files.
# Composes with the global `git-hooks/pre-commit` (gitleaks): the global
# hook explicitly chain-calls the repo-local .git/hooks/pre-commit that
# `lefthook install` writes — so both run on commit here, gitleaks-only
# elsewhere.
#
# Install (idempotent; sync.sh runs this automatically):
#   lefthook install

pre-commit:
  parallel: true
  commands:
    shellcheck:
      glob: "{*.sh,git-hooks/*,dot-claude/statusline-command.sh,dot-claude/hooks/*}"
      run: shellcheck -x {staged_files}
    shfmt-check:
      glob: "{*.sh,git-hooks/*,dot-claude/statusline-command.sh,dot-claude/hooks/*}"
      # -d prints a unified diff and exits nonzero — won't auto-rewrite on commit
      run: shfmt -d -i 2 -ci -sr {staged_files}

# pre-push: sanity check that the box itself is healthy before pushing
# dotfiles changes. Catches things like a broken mise/node/bun install,
# missing git identity — i.e. drift between this repo and the machine.
pre-push:
  commands:
    sync-health:
      run: ./sync.sh --only=health
