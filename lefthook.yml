# Lefthook config for this repo (a botu config / dotfiles repo).
#
# pre-commit: lint staged shell + guard secrets and settings.json.
#
# no_auto_install: botu owns hook installation (the `lefthook` hook runs
# `lefthook install` on apply). After a lefthook.yml change, re-run
# `botu apply --only=lefthook` (or `lefthook install`) to refresh the checksum.
no_auto_install: true

pre-commit:
  parallel: true
  commands:
    shellcheck:
      # `*.sh` matches the hooks + botuinit.sh recursively.
      glob: "{*.sh,git-template/hooks/*}"
      run: shellcheck -x {staged_files}
    shfmt-check:
      # botufile is DSL config (an aligned link table by design) — validated by
      # `botu apply --dry-run`, not shfmt, so it's deliberately not formatted here.
      glob: "{*.sh,git-template/hooks/*}"
      # -d prints a unified diff and exits nonzero — won't auto-rewrite on commit
      run: shfmt -d -i 2 -ci -sr {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact -v --no-banner
    settings-json-validity:
      # Backstop against committing a broken settings.json (breaks every Claude session).
      glob: "dot-claude/settings*.json"
      run: jq -e . {staged_files} > /dev/null
    toml-validity:
      # The botufile.toml IS the repo — a parse error only surfaces at `botu
      # apply` time on a real machine otherwise. --no-schema = pure syntax check
      # (hermetic, offline); won't reformat the hand-aligned link tables.
      glob: "*.toml"
      run: taplo check --no-schema {staged_files}

# commit-msg: forward-only hygiene guard. Rejects throwaway subjects (bare
# "WIP"/"wip" or a single character) so they don't land in permanent history.
# Existing history is untouched. Convention: `scope: summary` or
# `type(scope): summary` (see CLAUDE.md). Bypass once with: git commit --no-verify
commit-msg:
  commands:
    no-wip:
      run: |
        subject=$(head -1 "{1}")
        if printf '%s' "$subject" | grep -qiE '^(wip|.)$'; then
          printf 'commit-msg: refusing throwaway subject "%s" — write a real summary (bypass: --no-verify)\n' "$subject" >&2
          exit 1
        fi
