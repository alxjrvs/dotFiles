# Lefthook config for this repo (dotfiles itself).
#
# pre-commit: lint staged shell + guard secrets and settings.json.
# pre-push:   run the bats smoke suite (the prune .bak-deletion safety net).
#
# no_auto_install: dot sync owns hook installation (install/85-lefthook.sh
# runs `lefthook install` on every sync). After a lefthook.yml change,
# re-run `dot sync` (or `lefthook install`) to refresh the checksum.
no_auto_install: true

pre-commit:
  parallel: true
  commands:
    shellcheck:
      # `*.sh` matches recursively; the extensionless entrypoints are listed explicitly.
      glob: "{*.sh,dot,sync,doctor,git-template/hooks/*}"
      run: shellcheck -x {staged_files}
    shfmt-check:
      glob: "{*.sh,dot,sync,doctor,git-template/hooks/*}"
      # -d prints a unified diff and exits nonzero — won't auto-rewrite on commit
      run: shfmt -d -i 2 -ci -sr {staged_files}
    gitleaks:
      run: gitleaks protect --staged --redact -v --no-banner
    settings-json-validity:
      # Backstop against committing a broken settings.json (breaks every Claude session).
      glob: "dot-claude/settings*.json"
      run: jq -e . {staged_files} > /dev/null

pre-push:
  commands:
    bats:
      # The one suite worth gating a push on: prune is the only subsystem that
      # deletes files (guarded `.bak` cleanup). Seconds-scale, fully offline.
      run: bats tests/bats/
