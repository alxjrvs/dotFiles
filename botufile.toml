[[section]]
name = "tldr cache"

# mise installs the `tldr` binary (zsh-fragments section, earlier → on PATH
# here), but tealdeer ships no pages — `tldr <cmd>` errors until the archive is
# fetched once. Do it at apply time so a fresh machine is ready. `|| true` keeps
# an offline apply from failing on a non-critical cache; re-run with
# `botu apply --only="tldr cache"` once networked.
[[section.run]]
on = "apply"
cmd = "tldr --update || true"

