# ~/.config/1Password/ssh/agent.toml — symlinked from dotfiles.
#
# Controls which keys the 1Password SSH agent offers, and in what order.
# Without this file the agent offers EVERY SSH key in every vault; servers
# (e.g. GitHub) reject auth after 6 failed key offers, so keep this tight.
#
# Order matters: most-used key first means fewer offers per connection.
# Docs: https://developer.1password.com/docs/ssh/agent/config
#
# Per-item form (preferred once keys are named):
#   [[ssh-keys]]
#   item = "GitHub"
#   vault = "Personal"

# Offer only keys from the Personal vault.
[[ssh-keys]]
vault = "Personal"
