# Atuin — minimal overrides. Everything else is upstream defaults.
# Full reference: https://docs.atuin.sh/configuration/config/

# Enter executes the selected line immediately (tab keeps the old "place in
# prompt for editing" behavior).
enter_accept = true

# Match the shell's vi-mode (zsh `bindkey -v`).
keymap_mode = "vim-normal"

# Compact rendering — less screen-takeover than the default full TUI.
style = "compact"
inline_height = 20

[sync]
# Atuin sync v2 (encrypted record sync). Required for cross-machine history.
records = true

[history]
# Drop accidentally-typed secrets BEFORE they're stored / synced. zsh's
# HIST_IGNORE_SPACE doesn't propagate to atuin's preexec hook.
secret_filters = [
  "(?i)(password|secret|token|apikey|api[_-]?key|pat)\\s*[:=]\\s*\\S+",
  "gh[oprsu]_[A-Za-z0-9]{20,}",
  "sk-[A-Za-z0-9_-]{20,}",
  "AKIA[0-9A-Z]{16}",
]
